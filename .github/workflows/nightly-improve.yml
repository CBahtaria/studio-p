name: Nightly AI Self-Improvement

# Blue-green loop: Claude reviews src/ nightly, fixes issues, opens a PR to staging.
# Human reviews and merges — nothing auto-deploys to production.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    name: AI Code Improvement
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "studio-p-bot"
          git config user.email "bot@studiop.sz"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Baseline type-check
        id: typecheck
        run: |
          set +e
          TSC_OUT=$(node_modules/.bin/tsc --noEmit 2>&1)
          set -e
          {
            echo "TSC_OUTPUT<<EOF_TSC"
            printf '%s\n' "$TSC_OUT"
            echo "EOF_TSC"
          } >> "$GITHUB_OUTPUT"
          echo "$TSC_OUT" || true

      - name: Run self-improvement agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TSC_BASELINE: ${{ steps.typecheck.outputs.TSC_OUTPUT }}
        run: node scripts/self-improve.mjs
        timeout-minutes: 15

      - name: Check for changes
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD -- src/ | tr '\n' ',')
          echo "CHANGED_FILES=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ]; then
            echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
            echo "No src/ files changed — skipping PR."
          fi

      - name: Post-agent type-check
        if: steps.diff.outputs.HAS_CHANGES == 'true'
        run: |
          set +e
          node_modules/.bin/tsc --noEmit 2>&1
          EXIT=$?
          set -e
          if [ $EXIT -eq 0 ]; then
            echo "TYPECHECK_PASSED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::Post-agent tsc failed — PR creation skipped"
            echo "TYPECHECK_PASSED=false" >> "$GITHUB_ENV"
          fi

      - name: Commit and push
        if: >
          steps.diff.outputs.HAS_CHANGES == 'true' &&
          env.TYPECHECK_PASSED == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="improve/${DATE}"
          git checkout -b "$BRANCH"
          git add src/
          git commit -m "chore: nightly self-improvement ${DATE}"
          git push origin "$BRANCH"
          echo "IMPROVE_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "IMPROVE_DATE=$DATE" >> "$GITHUB_ENV"

      - name: Build PR body
        if: >
          steps.diff.outputs.HAS_CHANGES == 'true' &&
          env.TYPECHECK_PASSED == 'true'
        run: |
          SUMMARY=$(cat /tmp/improve-summary.json 2>/dev/null || echo '{"changes":[]}')
          FIX_LIST=$(node -e "
            const s = JSON.parse(process.env.SUMMARY || '{\"changes\":[]}');
            const lines = (s.changes || [])
              .map(c => '- \`' + c.file + '\`: ' + c.reason)
              .join('\n');
            process.stdout.write(lines || '- (no structured summary available)');
          " SUMMARY="$SUMMARY")
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"
          {
            echo "## Nightly AI Self-Improvement — ${IMPROVE_DATE}"
            echo ""
            echo "This PR was opened automatically. Claude (claude-sonnet-4-6) reviewed all TypeScript source files."
            echo ""
            echo "**Do not merge without reviewing each changed file.**"
            echo ""
            echo "---"
            echo ""
            echo "## Fixes Applied"
            echo ""
            echo "${FIX_LIST}"
            echo ""
            echo "---"
            echo ""
            echo "## Files Modified"
            echo ""
            echo "\`${CHANGED}\`"
            echo ""
            echo "---"
            echo ""
            echo "## How to Review"
            echo ""
            echo "1. Check each diff in the **Files changed** tab."
            echo "2. Optionally: \`git checkout ${IMPROVE_BRANCH} && npm run dev\`"
            echo "3. \`npm run type-check\` already passed before this PR was created."
            echo "4. Merge into \`staging\` → Vercel green preview builds automatically."
            echo "5. When satisfied: \`./scripts/blue-green.sh promote\` to go live."
            echo ""
            echo "---"
            echo ""
            echo "## Safety Guarantees"
            echo ""
            echo "- Agent only modified files inside \`src/\`"
            echo "- Max 8 files and 40 tool calls per session"
            echo "- \`package.json\`, \`.env\`, \`supabase/\`, \`vercel.json\`, \`api/\` were never touched"
            echo "- This PR targets \`staging\` — never \`main\`"
            echo "- Post-agent \`tsc --noEmit\` passed before this PR was created"
            echo ""
            echo "🤖 Generated by [studio-p-bot](/.github/workflows/nightly-improve.yml)"
          } > /tmp/pr-body.md

      - name: Open PR to staging
        if: >
          steps.diff.outputs.HAS_CHANGES == 'true' &&
          env.TYPECHECK_PASSED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base staging \
            --head "$IMPROVE_BRANCH" \
            --title "chore: nightly self-improvement $IMPROVE_DATE" \
            --body-file /tmp/pr-body.md
